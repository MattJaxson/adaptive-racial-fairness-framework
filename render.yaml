services:
  - type: web
    name: fairness-audit-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEYS
        sync: false
      - key: COMMUNITY_DEFS_PATH
        value: data/community_definitions.json
    plan: free

  - type: web
    name: fairness-audit-landing
    runtime: static
    staticPublishPath: ./landing
    plan: free
